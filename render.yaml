services:
  - type: web
    name: video-streaming-platform
    env: python
    region: singapore  # closest to ap-south-1 (India)
    plan: free
    rootDir: .
    buildCommand: "./build.sh"
    startCommand: "gunicorn project.wsgi:application --chdir project --bind 0.0.0.0:$PORT"
    envVars:
      - key: SECRET_KEY
        generateValue: true          # Render auto-generates a secure secret key
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: PYTHON_VERSION
        value: "3.11.0"
