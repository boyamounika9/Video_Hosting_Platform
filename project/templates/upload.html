{% extends 'base.html' %}
{% load static %}

{% block title %}Upload Video | StreamVids{% endblock %}

{% block content %}
<div class="container">
    <div class="glass-card upload-card" style="margin-top: 2rem; margin-bottom: 2rem;">
        <div class="auth-header" style="text-align: left; margin-bottom: 2.5rem;">
            <h1 class="auth-title">Upload Video</h1>
            <p class="auth-subtitle">Share your content with the world.</p>
        </div>
        
        <form method="POST" enctype="multipart/form-data" action="">
            {% csrf_token %}
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
                
                <!-- Left Column -->
                <div>
                    <div class="form-group">
                        <label for="title" class="form-label">Video Title</label>
                        <input type="text" id="title" name="title" class="form-control" placeholder="Enter a catchy title" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="description" class="form-label">Description</label>
                        <textarea id="description" name="description" class="form-control" rows="8" placeholder="Tell viewers about your video..." required></textarea>
                    </div>
                </div>
                
                <!-- Right Column -->
                <div>
                    <div class="form-group">
                        <label class="form-label">Video File</label>
                        <div class="file-upload-area">
                            <div class="file-upload-icon">
                                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                            </div>
                            <p class="file-upload-text">Drag and drop a video file here, or click to browse.</p>
                            <input type="file" name="video_file" id="video_file" accept="video/mp4,video/x-m4v,video/*" style="opacity: 0; position: absolute; z-index: -1;" required>
                            <button type="button" class="btn btn-outline" onclick="document.getElementById('video_file').click()">Select File</button>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Thumbnail Image</label>
                        <div class="file-upload-area" style="padding: 1.5rem;">
                            <input type="file" name="thumbnail" id="thumbnail" accept="image/png, image/jpeg" style="opacity: 0; position: absolute; z-index: -1;" required>
                            <button type="button" class="btn btn-outline" onclick="document.getElementById('thumbnail').click()">Upload Thumbnail</button>
                            <p style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.5rem;">Max file size: 2MB</p>
                        </div>
                    </div>
                </div>
            </div>
            
            <div style="margin-top: 2rem; padding-top: 2rem; border-top: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: flex-end; gap: 1rem;">
                <a href="{% url 'home' %}" class="btn btn-outline">Cancel</a>
                <button type="submit" class="btn btn-primary" style="padding: 0.8rem 2rem; font-size: 1.1rem;">Upload Video</button>
            </div>
        </form>
    </div>
</div>

<script>
    document.getElementById('video_file').addEventListener('change', function(e) {
        if(e.target.files.length > 0) {
            const fileName = e.target.files[0].name;
            const textElement = this.parentElement.querySelector('.file-upload-text');
            if(textElement) textElement.textContent = 'Selected: ' + fileName;
        }
    });

    document.getElementById('thumbnail').addEventListener('change', function(e) {
        if(e.target.files.length > 0) {
            const fileName = e.target.files[0].name;
            const btnElement = this.parentElement.querySelector('button');
            if(btnElement) btnElement.textContent = 'Thumbnail: ' + fileName;
        }
    });
</script>
{% endblock %}
